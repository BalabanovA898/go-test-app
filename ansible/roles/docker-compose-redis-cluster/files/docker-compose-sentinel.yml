services:
  redis-master:
    image: bitnami/redis
    container_name: redis-master
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=master

    ports:
      - "6379:6379"
    volumes:
      - ./data/master:/bitnami/redis/data
    networks:
      - redis-sentinel
    restart: unless-stopped

  redis-replica-1:
    image: bitnami/redis
    container_name: redis-replica-1
    depends_on:
      - redis-master
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_RDB_POLICY="save 900 1 save 300 10 save 60 10000"
    ports:
      - "6380:6379"
    volumes:
      - ./data/replica1:/bitnami/redis/data
    networks:
      - redis-sentinel
    restart: unless-stopped

  redis-sentinel-1:
    image: bitnami/redis-sentinel
    container_name: redis-sentinel-1
    depends_on:
      - redis-master
      - redis-replica-1
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_SENTINEL_QUORUM=2
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=10000
      - REDIS_RDB_POLICY="save 900 1 save 300 10 save 60 10000"
    ports:
      - "26379:26379"
    networks:
      - redis-sentinel
    restart: unless-stopped

  redis-sentinel-2:
    image: bitnami/redis-sentinel
    container_name: redis-sentinel-2
    depends_on:
      - redis-master
      - redis-replica-1
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_SENTINEL_QUORUM=2
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=10000
    ports:
      - "26380:26379"
    networks:
      - redis-sentinel
    restart: unless-stopped

  redis-sentinel-3:
    image: bitnami/redis-sentinel
    container_name: redis-sentinel-3
    depends_on:
      - redis-master
      - redis-replica-1
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_SENTINEL_QUORUM=2
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_FAILOVER_TIMEOUT=10000
    ports:
      - "26381:26379"
    networks:
      - redis-sentinel
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: redis-exporter
    depends_on:
      - redis-master
    environment:
      - REDIS_ADDR=redis://redis-master:6379
    ports:
      - "9121:9121"
    networks:
      - redis-sentinel
    restart: unless-stopped

networks:
  redis-sentinel:
    driver: bridge
