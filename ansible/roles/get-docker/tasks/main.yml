---
- name: Install dependencies
  ansible.builtin.apt:
      name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
      state: present
      update_cache: yes

- name: Create directory for GPG keys
  ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: "0755"

- name: Add official Docker GPG key
  ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
      repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
      state: present
      filename: docker
      update_cache: yes

- name: Install Docker and plugins
  ansible.builtin.apt:
      name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
      state: present
      update_cache: yes

- name: Start and enable Docker on boot
  ansible.builtin.systemd:
      name: docker
      state: started
      enabled: yes
      daemon_reload: yes

- name: Log in to private Docker registry
  community.docker.docker_login:
      registry_url: dhi.io
      username: "{{ vault_docker_registry_username }}"
      password: "{{ vault_docker_registry_password }}"
      reauthorize: true
